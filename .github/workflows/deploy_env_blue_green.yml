on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy_plan:
    name: "${{ inputs.environment }} deploy_plan"
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/job/setup_blue_green_control
        with:
          environment: ${{ inputs.environment }}
      - uses: ./.github/actions/job/plan_iac
        with:
          environment: ${{ inputs.environment }}

  deploy_apply:
    name: "${{ inputs.environment }} deploy_apply"
    runs-on: ubuntu-24.04
    needs: deploy_plan
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/job/setup_blue_green_control
        with:
          environment: ${{ inputs.environment }}
      - uses: ./.github/actions/job/deploy_iac
        with:
          environment: ${{ inputs.environment }}

  deploy_services:
    name: "${{ inputs.environment }} deploy_services"
    runs-on: ubuntu-24.04
    needs: deploy_apply
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3

  run_healthcheck:
    name: "${{ inputs.environment }} run_healthcheck"
    runs-on: ubuntu-24.04
    needs: deploy_services
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3

  destroy_plan:
    name: "${{ inputs.environment }} destroy_plan"
    runs-on: ubuntu-24.04
    needs: run_healthcheck
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/job/setup_blue_green_control
        with:
          environment: ${{ inputs.environment }}
      - uses: ./.github/actions/job/plan_iac
        with:
          environment: ${{ inputs.environment }}

  destroy_apply:
    name: "${{ inputs.environment }} destroy_apply"
    runs-on: ubuntu-24.04
    needs: destroy_plan
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/job/setup_blue_green_control
        with:
          environment: ${{ inputs.environment }}
      - uses: ./.github/actions/job/deploy_iac
        with:
          environment: ${{ inputs.environment }}