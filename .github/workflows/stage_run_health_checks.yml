on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stage:
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  run_health_check:
    name: "${{ inputs.stage }}: run_health_check"
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/job/run_health_checks
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}
          sys_is_blue_deployed: ${{ vars.SYS_IS_BLUE_DEPLOYED }}
          sys_is_green_deployed: ${{ vars.SYS_IS_GREEN_DEPLOYED }}
          sys_is_green_live: ${{ vars.SYS_IS_GREEN_LIVE }}
          sys_is_skip_healthcheck: ${{ vars.SYS_IS_SKIP_HEALTHCHECK }}
          sys_live_aks_nodepool: ${{ vars.SYS_LIVE_AKS_NODEPOOL }}
          sys_svc_deploy_dns_zone: ${{ vars.SYS_SVC_DEPLOY_DNS_ZONE }}
          sys_svc_deploy_nodepool_suffix: ${{ vars.SYS_SVC_DEPLOY_NODEPOOL_SUFFIX }}