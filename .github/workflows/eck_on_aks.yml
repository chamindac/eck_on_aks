name: ECK on AKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prd-eus-001

jobs:
  deploy:
    name: "${{ inputs.environment }}"
    uses: ./.github/workflows/env_blue_green_stages.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit