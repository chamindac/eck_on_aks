on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  stage_deploy:
    name: "${{ inputs.environment }}"
    uses: ./.github/workflows/deploy_iac.yml
    with:
      environment: ${{ inputs.environment }}
      stage: deploy
  
  stage_switch:
    name: "${{ inputs.environment }}"
    needs: stage_deploy
    uses: ./.github/workflows/deploy_services.yml
    with:
      environment: ${{ inputs.environment }}
      stage: switch
  
  stage_destroy:
    name: "${{ inputs.environment }}"
    needs: stage_switch
    uses: ./.github/workflows/deploy_iac.yml
    with:
      environment: ${{ inputs.environment }}
      stage: destroy