on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  stage_deploy:
    name: "${{ inputs.environment }}"
    uses: ./.github/workflows/stage_deploy.yml
    with:
      environment: ${{ inputs.environment }}
      stage: deploy
  
  stage_switch:
    name: "${{ inputs.environment }}"
    needs: stage_deploy
    uses: ./.github/workflows/stage_switch.yml
    with:
      environment: ${{ inputs.environment }}
      stage: switch

