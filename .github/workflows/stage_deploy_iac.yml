on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stage:
        required: true
        type: string

jobs:
  setup_blue_green_control_plan_iac:
    name: "${{ inputs.stage }}: setup_blue_green_control (plan_iac)"
    uses: ./.github/workflows/job_setup_blue_green_control.yml
    with:
      environment: ${{ inputs.environment }}
      stage: ${{ inputs.stage }}
    # Forwards all secrets from this workflow to the called workflow, including GH_VARIABLES_PAT.
    # Without this, the called workflow would have no access to any secrets.
    secrets: inherit

  plan_iac:
    name: "${{ inputs.stage }}: plan_iac"
    runs-on: ubuntu-24.04
    needs: setup_blue_green_control_plan_iac
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      
      - uses: ./.github/actions/job/plan_iac
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}

  setup_blue_green_control_deploy_iac:
    name: "${{ inputs.stage }}: setup_blue_green_control (deploy_iac)"
    needs: plan_iac
    uses: ./.github/workflows/job_setup_blue_green_control.yml
    with:
      environment: ${{ inputs.environment }}
      stage: ${{ inputs.stage }}
    # Forwards all secrets from this workflow to the called workflow, including GH_VARIABLES_PAT.
    # Without this, the called workflow would have no access to any secrets.
    secrets: inherit

  deploy_iac:
    name: "${{ inputs.stage }}: deploy_iac"
    runs-on: ubuntu-24.04
    needs: setup_blue_green_control_deploy_iac
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      
      - uses: ./.github/actions/job/deploy_iac
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}
      
      - if: ${{ inputs.stage == 'deploy' }}
        uses: ./.github/actions/job/run_aks_nodepool_validation
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}