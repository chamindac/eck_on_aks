on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stage:
        required: true
        type: string

jobs:
  setup_blue_green_control_plan_iac:
    name: "${{ inputs.stage }}: setup_blue_green_control (plan_iac)"
    uses: ./.github/workflows/job_setup_blue_green_control.yml
    with:
      environment: ${{ inputs.environment }}
      stage: ${{ inputs.stage }}
    # Forwards all secrets from this workflow to the called workflow, including GH_VARIABLES_PAT.
    # Without this, the called workflow would have no access to any secrets.
    secrets: inherit

  plan_iac:
    name: "${{ inputs.stage }}: plan_iac"
    runs-on: ubuntu-24.04
    needs: setup_blue_green_control_plan_iac
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      
      - uses: ./.github/actions/job/plan_iac
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}
          sys_is_blue_deployed: ${{ vars.SYS_IS_BLUE_DEPLOYED }}
          sys_is_green_deployed: ${{ vars.SYS_IS_GREEN_DEPLOYED }}
          sys_is_green_live: ${{ vars.SYS_IS_GREEN_LIVE }}
          sys_is_skip_healthcheck: ${{ vars.SYS_IS_SKIP_HEALTHCHECK }}
          sys_live_aks_nodepool: ${{ vars.SYS_LIVE_AKS_NODEPOOL }}
          sys_svc_deploy_dns_zone: ${{ vars.SYS_SVC_DEPLOY_DNS_ZONE }}
          sys_svc_deploy_nodepool_suffix: ${{ vars.SYS_SVC_DEPLOY_NODEPOOL_SUFFIX }}

  setup_blue_green_control_deploy_iac:
    name: "${{ inputs.stage }}: setup_blue_green_control (deploy_iac)"
    needs: plan_iac
    uses: ./.github/workflows/job_setup_blue_green_control.yml
    with:
      environment: ${{ inputs.environment }}
      stage: ${{ inputs.stage }}
    # Forwards all secrets from this workflow to the called workflow, including GH_VARIABLES_PAT.
    # Without this, the called workflow would have no access to any secrets.
    secrets: inherit

  deploy_iac:
    name: "${{ inputs.stage }}: deploy_iac"
    runs-on: ubuntu-24.04
    needs: setup_blue_green_control_deploy_iac
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3
      
      - uses: ./.github/actions/job/deploy_iac
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}
          sys_is_blue_deployed: ${{ vars.SYS_IS_BLUE_DEPLOYED }}
          sys_is_green_deployed: ${{ vars.SYS_IS_GREEN_DEPLOYED }}
          sys_is_green_live: ${{ vars.SYS_IS_GREEN_LIVE }}
          sys_is_skip_healthcheck: ${{ vars.SYS_IS_SKIP_HEALTHCHECK }}
          sys_live_aks_nodepool: ${{ vars.SYS_LIVE_AKS_NODEPOOL }}
          sys_svc_deploy_dns_zone: ${{ vars.SYS_SVC_DEPLOY_DNS_ZONE }}
          sys_svc_deploy_nodepool_suffix: ${{ vars.SYS_SVC_DEPLOY_NODEPOOL_SUFFIX }}
      
      - if: ${{ inputs.stage == 'deploy' }}
        uses: ./.github/actions/job/run_aks_nodepool_validation
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}
          sys_is_blue_deployed: ${{ vars.SYS_IS_BLUE_DEPLOYED }}
          sys_is_green_deployed: ${{ vars.SYS_IS_GREEN_DEPLOYED }}
          sys_is_green_live: ${{ vars.SYS_IS_GREEN_LIVE }}
          sys_is_skip_healthcheck: ${{ vars.SYS_IS_SKIP_HEALTHCHECK }}
          sys_live_aks_nodepool: ${{ vars.SYS_LIVE_AKS_NODEPOOL }}
          sys_svc_deploy_dns_zone: ${{ vars.SYS_SVC_DEPLOY_DNS_ZONE }}
          sys_svc_deploy_nodepool_suffix: ${{ vars.SYS_SVC_DEPLOY_NODEPOOL_SUFFIX }}