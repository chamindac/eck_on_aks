on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stage:
        required: true
        type: string

jobs:
  setup_blue_green_control_deploy_services:
    name: "${{ inputs.stage }}: setup_blue_green_control (deploy_services)"
    uses: ./.github/workflows/job_setup_blue_green_control.yml
    with:
      environment: ${{ inputs.environment }}
      stage: ${{ inputs.stage }}
    # Forwards all secrets from this workflow to the called workflow, including GH_VARIABLES_PAT.
    # Without this, the called workflow would have no access to any secrets.
    secrets: inherit

  deploy_services:
    name: "${{ inputs.stage }}: deploy_services"
    runs-on: ubuntu-24.04
    needs: setup_blue_green_control_deploy_services
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/job/deploy_services
        with:
          environment: ${{ inputs.environment }}
          stage: ${{ inputs.stage }}